services:
  - type: web
    name: wallet-balance-api
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags '-s -w' -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CRON_KEY
        sync: false
      - key: ENABLE_BANKING_APP_ID
        sync: false
      - key: ENABLE_BANKING_PRIVATE_KEY
        sync: false
      - key: APP_URL
        sync: false
